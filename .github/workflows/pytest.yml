name: pytest

on:
  push:
  pull_request:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 06:00 UTC

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          # Oldest supported: ortools 9.10 (no Python 3.13 support)
          - python-version: "3.10"
            ortools-version: "9.10"
          - python-version: "3.12"
            ortools-version: "9.10"
          # Latest ortools
          - python-version: "3.10"
            ortools-version: "latest"
          - python-version: "3.13"
            ortools-version: "latest"

    name:
      "Python ${{ matrix.python-version }} / ortools ${{ matrix.ortools-version
      }}"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install package with test dependencies
        run: |
          if [ "${{ matrix.ortools-version }}" = "latest" ]; then
            pip install ".[test]"
          else
            pip install ".[test]" "ortools==${{ matrix.ortools-version }}.*"
          fi
      - name: Lint with ruff
        run: |
          pip install ruff
          ruff check .
      - name: Test with pytest
        run: pytest
